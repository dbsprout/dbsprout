name: Train Integration (llama.cpp toolchain)

# Scoped to exporter-touching PRs only. GitHub does not schedule this
# workflow when no path matches, so it never blocks unrelated PRs; when
# it IS scheduled (exporter changed) it runs the real GGUF conversion and
# is the gating check for that PR. ci.yml (lint/test/benchmark) is left
# untouched so the fast suite + 95% coverage gate are unaffected.
on:
  pull_request:
    branches: [dev]
    paths:
      - "dbsprout/train/exporter.py"
      - ".github/workflows/train-integration.yml"

permissions:
  contents: read

# A single pinned llama.cpp release tag drives the binary asset, the
# source tarball, and the cache key. Bump procedure: docs/ci/llama-cpp-toolchain.md.
env:
  LLAMA_CPP_TAG: "b9174"

jobs:
  train-integration:
    name: GGUF export integration (real llama.cpp)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          version: "0.11.2"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Cache llama.cpp toolchain
        id: llama-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ runner.temp }}/llama-cpp
          key: llama-cpp-${{ env.LLAMA_CPP_TAG }}-ubuntu-x64

      - name: Provision llama.cpp toolchain (cache miss)
        if: steps.llama-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          tag="${LLAMA_CPP_TAG}"
          dest="${RUNNER_TEMP}/llama-cpp"
          mkdir -p "${dest}/bin" "${dest}/src"
          bin_url="https://github.com/ggml-org/llama.cpp/releases/download/${tag}/llama-${tag}-bin-ubuntu-x64.tar.gz"
          src_url="https://github.com/ggml-org/llama.cpp/archive/refs/tags/${tag}.tar.gz"
          echo "Downloading prebuilt binary: ${bin_url}"
          curl --fail --location --silent --show-error "${bin_url}" -o "${RUNNER_TEMP}/llama-bin.tar.gz"
          tar -xzf "${RUNNER_TEMP}/llama-bin.tar.gz" -C "${dest}/bin" --strip-components=1
          echo "Downloading matching source tarball: ${src_url}"
          curl --fail --location --silent --show-error "${src_url}" -o "${RUNNER_TEMP}/llama-src.tar.gz"
          tar -xzf "${RUNNER_TEMP}/llama-src.tar.gz" -C "${dest}/src" --strip-components=1
          echo "Binary tree:"; find "${dest}/bin" -maxdepth 2 -name 'llama-quantize' -print
          echo "Converter:"; find "${dest}/src" -maxdepth 2 -name 'convert_hf_to_gguf.py' -print

      - name: Resolve toolchain paths
        run: |
          set -euo pipefail
          dest="${RUNNER_TEMP}/llama-cpp"
          quant="$(find "${dest}/bin" -maxdepth 3 -type f -name 'llama-quantize' | head -n1)"
          conv="$(find "${dest}/src" -maxdepth 3 -type f -name 'convert_hf_to_gguf.py' | head -n1)"
          test -x "${quant}" || { echo "llama-quantize not found/executable" >&2; exit 1; }
          test -f "${conv}" || { echo "convert_hf_to_gguf.py not found" >&2; exit 1; }
          quant_dir="$(dirname "${quant}")"
          chmod +x "${quant}"
          echo "DBSPROUT_LLAMA_QUANTIZE=${quant}" >> "${GITHUB_ENV}"
          echo "DBSPROUT_LLAMA_CONVERT=${conv}" >> "${GITHUB_ENV}"
          echo "${quant_dir}" >> "${GITHUB_PATH}"
          echo "LD_LIBRARY_PATH=${quant_dir}:${LD_LIBRARY_PATH:-}" >> "${GITHUB_ENV}"

      - name: Install DBSprout (dev) + pinned converter deps
        run: |
          set -euo pipefail
          uv sync --extra dev
          # convert_hf_to_gguf.py runs under THIS uv venv (the test calls
          # _run_tool([sys.executable, converter, ...])), so its pinned
          # deps must be importable here. Job-scoped only; never written
          # to uv.lock. Versions pinned to the llama.cpp ${LLAMA_CPP_TAG}
          # requirements (see docs/ci/llama-cpp-toolchain.md for the bump
          # procedure if the tag changes).
          uv pip install \
            --extra-index-url https://download.pytorch.org/whl/cpu \
            "torch~=2.6.0" \
            "transformers==5.5.1" \
            "numpy~=1.26.4" \
            "sentencepiece>=0.1.98,<0.3.0" \
            "gguf>=0.1.0" \
            "protobuf>=4.21.0,<5.0.0" \
            "safetensors>=0.4"

      - name: Run GGUF export integration tests (real toolchain)
        run: |
          set -euo pipefail
          uv run pytest -m integration -v --no-cov \
            tests/unit/test_train/test_exporter.py \
            tests/integration/test_train/test_exporter_toolchain.py
