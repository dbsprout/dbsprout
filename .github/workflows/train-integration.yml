name: Train Integration (llama.cpp toolchain)

# Scoped to exporter-touching PRs only. GitHub does not schedule this
# workflow when no path matches, so it never blocks unrelated PRs; when
# it IS scheduled (exporter changed) it runs the real GGUF conversion and
# is the gating check for that PR. ci.yml (lint/test/benchmark) is left
# untouched so the fast suite + 95% coverage gate are unaffected.
on:
  pull_request:
    branches: [dev]
    paths:
      - "dbsprout/train/exporter.py"
      - ".github/workflows/train-integration.yml"

permissions:
  contents: read

# A single pinned llama.cpp release tag drives the binary asset, the
# source tarball, and the cache key. Bump procedure: docs/ci/llama-cpp-toolchain.md.
env:
  LLAMA_CPP_TAG: "b9174"

jobs:
  train-integration:
    name: GGUF export integration (real llama.cpp)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          version: "0.11.2"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
