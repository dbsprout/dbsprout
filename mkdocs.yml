site_name: DBSprout
site_description: Generate realistic seed data from your database schema.
site_url: https://dbsprout.github.io/dbsprout/
repo_url: https://github.com/dbsprout/dbsprout
repo_name: dbsprout/dbsprout
docs_dir: site_docs
strict: true

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences

nav:
  - Home: index.md
  - Getting Started:
      - Install: getting-started/install.md
      - Quick Start: getting-started/quick-start.md
  - User Guide:
      - CLI Reference: user-guide/cli.md
      - Configuration: user-guide/configuration.md
  - Architecture:
      - Overview: architecture/overview.md
  - Contributing:
      - Overview: contributing.md
      - Writing Plugins: contributing/plugins.md
